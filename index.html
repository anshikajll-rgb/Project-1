<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chrome Self-Hosted To-Do</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <div class="hero-panel glass-card">
      <div class="hero-copy">
        <h1>Chrome Self-Hosted To-Do</h1>
        <p>Data is saved directly in your browser!</p>
      </div>

      <form id="todo-form" class="todo-input-form">
        <input type="text" id="todo-title" placeholder="What needs doing?" required autocomplete="off">
        <input type="text" id="todo-desc" placeholder="Details (optional)" autocomplete="off">
        <button type="submit" class="primary-btn square-btn">+</button>
      </form>

      <div class="task-list-container">
        <ul id="task-list" class="task-list"></ul>
      </div>
    </div>
  </div>

  <div class="background-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
